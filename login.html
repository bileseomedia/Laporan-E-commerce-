<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cylla.store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <h1>🛍️ Cylla.store</h1>
                <p>PT PANCA AGUNG</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="admin@cylla.store" required>
                </div>
                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" id="password" placeholder="******" required>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <p class="info-login">Demo: admin@cylla.store / password: 123</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
